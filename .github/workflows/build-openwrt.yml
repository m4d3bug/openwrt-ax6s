name: Build OpenWrt for Redmi AX6S

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH into build environment'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v23.05.5
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get -y install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-distutils python3-setuptools rsync swig unzip zlib1g-dev \
          file wget qemu-utils
        sudo timedatectl set-timezone "$TZ"

    - name: Clone OpenWrt source
      run: |
        git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth 1 openwrt

    - name: Run diy-part1.sh (add feeds)
      run: |
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update and install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Run diy-part2.sh (customize)
      run: |
        [ -e files ] && cp -r files openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: SSH connection
      uses: P3TERX/ssh2actions@v1.0.0
      if: github.event.inputs.ssh == 'true'
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Download packages
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile firmware
      run: |
        cd openwrt
        echo "Compile start: $(date)"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "Compile end: $(date)"

    - name: Organize firmware files
      id: organize
      run: |
        cd openwrt/bin/targets/mediatek/mt7622
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "DATE=$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-ax6s-${{ env.DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.DATE }}
        name: OpenWrt AX6S ${{ env.DATE }}
        body: |
          Minimal OpenWrt build for Redmi AX6S
          - Passwall2 + SmartDNS
          - Built from OpenWrt ${{ env.REPO_BRANCH }}
        files: ${{ env.FIRMWARE }}/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
